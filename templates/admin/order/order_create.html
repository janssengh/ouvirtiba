{% extends "layout_admin.html" %}
{% block content %}
{% include 'navbar_admin.html' %}

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="fw-bold text-primary mb-3">{{ titulo }}</h3>
            <form method="POST">
                <!-- Cliente e Observação -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="client_id" class="form-label">Cliente</label>
                        <select name="client_id" id="client_id" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for c in clients %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="observation" class="form-label">Observação</label>
                        <input type="text" name="observation" id="observation" class="form-control">
                    </div>
                </div>

                <hr>
                <!-- Forma de Pagamento -->
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label for="payment_form" class="form-label">Forma de Pagamento</label>
                        <select name="payment_form" id="payment_form" class="form-select" required>
                            <option value="">Selecione...</option>
                            <option value="1">Dinheiro</option>
                            <option value="2">Pix</option>
                            <option value="3">Cartão Débito</option>
                            <option value="4">Cartão Crédito</option>
                            <option value="5">Entrada + Parcelas Cartão Crédito</option>
                        </select>
                    </div>

                    <div class="col-md-4" id="payment_amount_div" style="display:none;">
                        <label for="payment_amount_inp" class="form-label">Valor de Entrada</label>
                        <input type="number" step="0.01" min="0" name="payment_amount_inp" id="payment_amount_inp" class="form-control">
                    </div>

                    <div class="col-md-4" id="payment_form_inp_div" style="display:none;">
                        <label for="payment_form_inp" class="form-label">Forma da Entrada</label>
                        <select name="payment_form_inp" id="payment_form_inp" class="form-select">
                            <option value="">Selecione...</option>
                            <option value="1">Dinheiro</option>
                            <option value="2">Pix</option>
                            <option value="3">Cartão Débito</option>
                        </select>
                    </div>

                    <div class="col-md-4" id="payment_condition_div" style="display:none;">
                        <label for="payment_condition" class="form-label">Parcelamento (Qtde)</label>
                        <input type="number" min="1" max="18" name="payment_condition" id="payment_condition" class="form-control">
                    </div>
                </div>

                <hr>
                <h5 class="text-secondary mb-2">Itens do Pedido</h5>

                <!-- ✅ CABEÇALHOS FIXOS - APARECEM APENAS UMA VEZ -->
                <div class="row mb-1">
                    <div class="col-md-3"><small class="text-muted fw-bold">Produto</small></div>
                    <div class="col-md-2"><small class="text-muted fw-bold">Nº Série</small></div>
                    <div class="col-md-1"><small class="text-muted fw-bold">Qtde</small></div>
                    <div class="col-md-2"><small class="text-muted fw-bold">Preço Bruto</small></div>
                    <div class="col-md-1"><small class="text-muted fw-bold">Desc. R$</small></div>
                    <div class="col-md-2"><small class="text-muted fw-bold">Total Item</small></div>
                    <div class="col-md-1"><small class="text-muted fw-bold">Ação</small></div>
                </div>

                <div id="itens-container">
                    <div class="row mb-2 item-row align-items-center">
                        <div class="col-md-3">
                            <select name="product_id[]" class="form-select form-select-sm product-select" required>
                                <option value="">Produto...</option>
                                {% for tipo, produtos_tipo in products | groupby('type_name') %}
                                <optgroup label="{{ tipo }}">
                                    {% for p in produtos_tipo %}
                                    <option value="{{ p.id }}" data-price="{{ p.sale_price }}" data-discount="{{ p.discount if p.discount else 0 }}">
                                        {{ p.name }} (Estoque: {{ p.stock }})
                                    </option>
                                    {% endfor %}
                                </optgroup>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-2">
                            <input type="text" name="serialnumber[]" class="form-control form-control-sm serialnumber-input" maxlength="15" placeholder="Serial" autocomplete="off">
                        </div>
                        <div class="col-md-1">
                            <input type="number" name="quantity[]" class="form-control form-control-sm quantity-input" min="1" value="1" required>
                        </div>
                        <div class="col-md-2">
                            <!-- Preço Bruto: preenchido automaticamente ao selecionar produto, somente leitura -->
                            <input type="number" step="0.01" min="0" name="price[]" class="form-control form-control-sm price-input" placeholder="0.00" readonly style="background-color:#f8f9fa;" required>
                            <input type="hidden" class="original-price" value="">
                        </div>
                        <div class="col-md-1">
                            <!-- Valor do desconto em R$: editável pelo usuário -->
                            <input type="number" step="0.01" min="0" name="discount_value[]" class="form-control form-control-sm discount-value-input" placeholder="0.00" value="0">
                        </div>
                        <div class="col-md-2">
                            <input type="text" name="item_total[]" class="form-control form-control-sm total-input" readonly placeholder="0.00">
                        </div>
                        <div class="col-md-1 text-center">
                            <button type="button" class="btn btn-outline-danger btn-sm remove-item">🗑</button>
                        </div>
                    </div>
                </div>

                <div class="text-end mb-3">
                    <button type="button" class="btn btn-outline-primary btn-sm" id="add-item">+ Adicionar Item</button>
                </div>

                <!-- ✅ RESUMO DO PEDIDO -->
                <div class="card bg-light mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <strong>Total Bruto:</strong>
                                <input type="text" id="total-bruto" class="form-control form-control-sm" readonly value="R$ 0.00">
                            </div>
                            <div class="col-md-4">
                                <strong>Total Desconto:</strong>
                                <input type="text" id="total-desconto" class="form-control form-control-sm" readonly value="R$ 0.00">
                            </div>
                            <div class="col-md-4">
                                <strong>Total Líquido:</strong>
                                <input type="text" id="total-liquido" class="form-control form-control-sm fw-bold" readonly value="R$ 0.00">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-success">💾 Salvar Pedido</button>
                    <button type="button" id="cancel-button" class="btn btn-outline-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // ─── Pagamento condicional ───────────────────────────────────────────────
    const paymentForm = document.getElementById('payment_form');
    const paymentAmountDiv = document.getElementById('payment_amount_div');
    const paymentFormInpDiv = document.getElementById('payment_form_inp_div');
    const paymentConditionDiv = document.getElementById('payment_condition_div');

    function togglePaymentFields() {
        const val = paymentForm.value;
        const isCredit  = (val === '4');
        const isEntrada = (val === '5');
        paymentAmountDiv.style.display    = isEntrada ? 'block' : 'none';
        paymentFormInpDiv.style.display   = isEntrada ? 'block' : 'none';
        paymentConditionDiv.style.display = (isCredit || isEntrada) ? 'block' : 'none';
    }
    if (paymentForm) {
        paymentForm.addEventListener('change', togglePaymentFields);
        togglePaymentFields();
    }

    // ─── Cálculo de uma linha ────────────────────────────────────────────────
    // Regras:
    //   preço bruto  = original-price (hidden) → exibido em price-input (readonly)
    //   total item   = (preço_bruto * qty) - desconto_R$
    //   desconto_R$  é digitado pelo usuário e enviado diretamente ao backend
    function calcRow(row) {
        const qty         = parseFloat(row.querySelector('.quantity-input').value)      || 0;
        const origPrice   = parseFloat(row.querySelector('.original-price').value)      || 0;
        const discountVal = parseFloat(row.querySelector('.discount-value-input').value) || 0;

        const brutoLinha  = origPrice * qty;

        // Não permite desconto maior que o valor bruto da linha
        const discountSafe = Math.min(discountVal, brutoLinha);
        if (discountVal > brutoLinha && brutoLinha > 0) {
            row.querySelector('.discount-value-input').value = discountSafe.toFixed(2);
        }

        const total = brutoLinha - discountSafe;

        // price-input exibe sempre o preço bruto (readonly)
        row.querySelector('.price-input').value = origPrice.toFixed(2);
        row.querySelector('.total-input').value = total.toFixed(2);
    }

    function calcTotals() {
        let bruto    = 0;
        let desconto = 0;
        document.querySelectorAll('.item-row').forEach(function (row) {
            const origPrice   = parseFloat(row.querySelector('.original-price').value)       || 0;
            const qty         = parseFloat(row.querySelector('.quantity-input').value)       || 0;
            const discountVal = parseFloat(row.querySelector('.discount-value-input').value) || 0;
            const brutoLinha  = origPrice * qty;
            bruto    += brutoLinha;
            desconto += Math.min(discountVal, brutoLinha);
        });
        document.getElementById('total-bruto').value    = 'R$ ' + bruto.toFixed(2);
        document.getElementById('total-desconto').value = 'R$ ' + desconto.toFixed(2);
        document.getElementById('total-liquido').value  = 'R$ ' + (bruto - desconto).toFixed(2);
    }

    // ─── Vincula eventos a uma linha ─────────────────────────────────────────
    function bindRowEvents(row) {

        // Selecionar produto → preenche preço bruto e calcula desconto R$ padrão do cadastro
        row.querySelector('.product-select').addEventListener('change', function () {
            const opt         = this.options[this.selectedIndex];
            const price       = parseFloat(opt.getAttribute('data-price'))    || 0;
            const discountPct = parseFloat(opt.getAttribute('data-discount')) || 0;
            const qty         = parseFloat(row.querySelector('.quantity-input').value) || 1;

            // Converte o % padrão do produto para valor R$ (apenas ponto de partida, editável)
            const discountVal = price * qty * (discountPct / 100);

            row.querySelector('.original-price').value           = price.toFixed(2);
            row.querySelector('.price-input').value              = price.toFixed(2);
            row.querySelector('.discount-value-input').value     = discountVal.toFixed(2);
            row.querySelector('.serialnumber-input').value       = '';
            calcRow(row);
            calcTotals();
        });

        // Usuário altera o desconto R$ → recalcula total
        row.querySelector('.discount-value-input').addEventListener('input', function () {
            const origPrice  = parseFloat(row.querySelector('.original-price').value) || 0;
            const qty        = parseFloat(row.querySelector('.quantity-input').value) || 0;
            const brutoLinha = origPrice * qty;
            let val = parseFloat(this.value) || 0;
            if (val < 0)          { val = 0;          this.value = '0'; }
            if (val > brutoLinha) { val = brutoLinha; this.value = brutoLinha.toFixed(2); }
            calcRow(row);
            calcTotals();
        });

        // Quantidade alterada → mantém desconto R$ absoluto e recalcula
        row.querySelector('.quantity-input').addEventListener('input', function () {
            calcRow(row);
            calcTotals();
        });

        // Remover linha
        row.querySelector('.remove-item').addEventListener('click', function () {
            if (document.querySelectorAll('.item-row').length > 1) {
                row.remove();
                calcTotals();
            } else {
                alert('O pedido deve ter ao menos um item.');
            }
        });
    }

    // Vincula a linha inicial
    document.querySelectorAll('.item-row').forEach(bindRowEvents);

    // ─── Adicionar nova linha ────────────────────────────────────────────────
    document.getElementById('add-item').addEventListener('click', function () {
        const container = document.getElementById('itens-container');
        const firstRow  = container.querySelector('.item-row');
        const newRow    = firstRow.cloneNode(true);

        newRow.querySelector('.product-select').selectedIndex     = 0;
        newRow.querySelector('.serialnumber-input').value         = '';
        newRow.querySelector('.quantity-input').value             = '1';
        newRow.querySelector('.price-input').value                = '';
        newRow.querySelector('.original-price').value             = '';
        newRow.querySelector('.discount-value-input').value       = '0';
        newRow.querySelector('.total-input').value                = '';

        container.appendChild(newRow);
        bindRowEvents(newRow);
    });

    // ─── Cancelar ───────────────────────────────────────────────────────────
    const cancelBtn = document.getElementById('cancel-button');
    if (cancelBtn) {
        cancelBtn.addEventListener('click', function () {
            window.location.href = "{{ url_for('order_bp.order_list') }}";
        });
    }

    // Cálculo inicial
    calcTotals();
});
</script>

{% endblock content %}
