{% extends "layout_admin.html" %}
{% block content %}
{% include 'navbar_admin.html' %}

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="fw-bold text-primary mb-3">{{ titulo }}</h3>

            <form method="POST">

                <!-- CLIENTE -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Cliente</label>
                        <select name="client_id" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for c in clients %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Observação</label>
                        <input type="text" name="observation" class="form-control">
                    </div>
                </div>

                <hr>

                <!-- ITENS -->
                <h5 class="text-secondary mb-2">Itens do Pedido</h5>

                <div class="row mb-1 fw-bold">
                    <div class="col-md-3">Produto</div>
                    <div class="col-md-2">Nº Série</div>
                    <div class="col-md-1">Qtde</div>
                    <div class="col-md-2">Preço Unit.</div>
                    <div class="col-md-1">Desc. R$</div>
                    <div class="col-md-2">Total</div>
                    <div class="col-md-1"></div>
                </div>

                <div id="itens-container">
                    <div class="row mb-2 item-row">

                        <div class="col-md-3">
                            <select name="product_id[]" class="form-select product-select" required>
                                <option value="">Produto...</option>
                                {% for p in products %}
                                <option value="{{ p.id }}"
                                        data-price="{{ p.price }}"
                                        data-discount="{{ p.discount or 0 }}">
                                    {{ p.name }} (Estoque: {{ p.stock }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-2">
                            <input type="text" name="serialnumber[]" class="form-control">
                        </div>

                        <div class="col-md-1">
                            <input type="number" name="quantity[]" class="form-control quantity-input" value="1" min="1">
                        </div>

                        <!-- PREÇO BRUTO -->
                        <div class="col-md-2">
                            <input type="number"
                                   name="price[]"
                                   class="form-control price-input"
                                   step="0.01"
                                   readonly
                                   style="background:#f8f9fa;">
                        </div>

                        <!-- DESCONTO -->
                        <div class="col-md-1">
                            <input type="number"
                                   name="discount_value[]"
                                   class="form-control discount-value-input"
                                   value="0.00"
                                   step="0.01"
                                   min="0"
                                   inputmode="decimal">

                            <input type="hidden"
                                   name="discount_pct[]"
                                   class="discount-pct-hidden"
                                   value="0">
                        </div>

                        <!-- TOTAL -->
                        <div class="col-md-2">
                            <input type="text"
                                   class="form-control total-input"
                                   readonly>
                        </div>

                        <div class="col-md-1 text-center">
                            <button type="button" class="btn btn-danger remove-item">X</button>
                        </div>

                    </div>
                </div>

                <button type="button" id="add-item" class="btn btn-primary btn-sm mt-2">+ Item</button>

                <hr>

                <!-- TOTAIS -->
                <div class="row">
                    <div class="col-md-4">
                        <input type="text" id="total-bruto" class="form-control" readonly>
                    </div>
                    <div class="col-md-4">
                        <input type="text" id="total-desconto" class="form-control" readonly>
                    </div>
                    <div class="col-md-4">
                        <input type="text" id="total-liquido" class="form-control fw-bold" readonly>
                    </div>
                </div>

                <div class="text-end mt-3">
                    <button type="submit" class="btn btn-success">Salvar</button>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    function calcRow(row) {
        const price = parseFloat(row.querySelector('.price-input').value) || 0;
        const qty = parseFloat(row.querySelector('.quantity-input').value) || 0;
        let discount = parseFloat(row.querySelector('.discount-value-input').value) || 0;

        const bruto = price * qty;

        if (discount > bruto) {
            discount = bruto;
            row.querySelector('.discount-value-input').value = bruto.toFixed(2);
        }

        const total = bruto - discount;
        const pct = bruto > 0 ? (discount / bruto) * 100 : 0;

        row.querySelector('.total-input').value = total.toFixed(2);
        row.querySelector('.discount-pct-hidden').value = pct.toFixed(4);
    }

    function calcTotals() {
        let bruto = 0;
        let desconto = 0;

        document.querySelectorAll('.item-row').forEach(row => {
            const price = parseFloat(row.querySelector('.price-input').value) || 0;
            const qty = parseFloat(row.querySelector('.quantity-input').value) || 0;
            const discount = parseFloat(row.querySelector('.discount-value-input').value) || 0;

            const b = price * qty;
            bruto += b;
            desconto += Math.min(discount, b);
        });

        document.getElementById('total-bruto').value = 'R$ ' + bruto.toFixed(2);
        document.getElementById('total-desconto').value = 'R$ ' + desconto.toFixed(2);
        document.getElementById('total-liquido').value = 'R$ ' + (bruto - desconto).toFixed(2);
    }

    function bind(row) {

        // Produto selecionado
        row.querySelector('.product-select').addEventListener('change', function () {
            const opt = this.options[this.selectedIndex];

            const price = parseFloat(opt.dataset.price) || 0;
            const pct = parseFloat(opt.dataset.discount) || 0;
            const qty = parseFloat(row.querySelector('.quantity-input').value) || 1;

            const discount = price * qty * (pct / 100);

            row.querySelector('.price-input').value = price.toFixed(2);
            row.querySelector('.discount-value-input').value = discount.toFixed(2);
            row.querySelector('.discount-pct-hidden').value = pct.toFixed(4);

            calcRow(row);
            calcTotals();
        });

        // Quantidade
        row.querySelector('.quantity-input').addEventListener('input', () => {
            calcRow(row);
            calcTotals();
        });

        // Desconto (corrige vírgula → ponto)
        row.querySelector('.discount-value-input').addEventListener('input', function () {
            this.value = this.value.replace(',', '.');
            calcRow(row);
            calcTotals();
        });

        // Remover
        row.querySelector('.remove-item').addEventListener('click', () => {
            if (document.querySelectorAll('.item-row').length > 1) {
                row.remove();
                calcTotals();
            }
        });
    }

    document.querySelectorAll('.item-row').forEach(bind);

    document.getElementById('add-item').addEventListener('click', () => {
        const container = document.getElementById('itens-container');
        const newRow = container.querySelector('.item-row').cloneNode(true);

        newRow.querySelectorAll('input').forEach(i => i.value = '');
        newRow.querySelector('.quantity-input').value = 1;
        newRow.querySelector('.discount-value-input').value = '0.00';
        newRow.querySelector('.discount-pct-hidden').value = '0';

        container.appendChild(newRow);
        bind(newRow);
    });

});
</script>

{% endblock %}
