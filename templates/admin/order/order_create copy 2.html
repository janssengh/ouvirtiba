{% extends "layout_admin.html" %}
{% block content %}
{% include 'navbar_admin.html' %}

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="fw-bold text-primary mb-3">{{ titulo }}</h3>
            <form method="POST">
                <!-- Cliente e Observação -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="client_id" class="form-label">Cliente</label>
                        <select name="client_id" id="client_id" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for c in clients %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="observation" class="form-label">Observação</label>
                        <input type="text" name="observation" id="observation" class="form-control">
                    </div>
                </div>

                <hr>
                <!-- Forma de Pagamento -->
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label for="payment_form" class="form-label">Forma de Pagamento</label>
                        <select name="payment_form" id="payment_form" class="form-select" required>
                            <option value="">Selecione...</option>
                            <option value="1">Dinheiro</option>
                            <option value="2">Pix</option>
                            <option value="3">Cartão Débito</option>
                            <option value="4">Cartão Crédito</option>
                            <option value="5">Entrada + Parcelas Cartão Crédito</option>
                        </select>
                    </div>

                    <div class="col-md-4" id="payment_amount_div" style="display:none;">
                        <label for="payment_amount_inp" class="form-label">Valor de Entrada</label>
                        <input type="number" step="0.01" min="0" name="payment_amount_inp" id="payment_amount_inp" class="form-control">
                    </div>

                    <div class="col-md-4" id="payment_form_inp_div" style="display:none;">
                        <label for="payment_form_inp" class="form-label">Forma da Entrada</label>
                        <select name="payment_form_inp" id="payment_form_inp" class="form-select">
                            <option value="">Selecione...</option>
                            <option value="1">Dinheiro</option>
                            <option value="2">Pix</option>
                            <option value="3">Cartão Débito</option>
                        </select>
                    </div>

                    <div class="col-md-4" id="payment_condition_div" style="display:none;">
                        <label for="payment_condition" class="form-label">Parcelamento (Qtde)</label>
                        <input type="number" min="1" max="18" name="payment_condition" id="payment_condition" class="form-control">
                    </div>
                </div>

                <hr>
                <h5 class="text-secondary mb-2">Itens do Pedido</h5>

                <!-- ✅ CABEÇALHOS FIXOS - APARECEM APENAS UMA VEZ -->
                <div class="row mb-1">
                    <div class="col-md-3"><small class="text-muted fw-bold">Produto</small></div>
                    <div class="col-md-2"><small class="text-muted fw-bold">Nº Série</small></div>
                    <div class="col-md-1"><small class="text-muted fw-bold">Qtde</small></div>
                    <div class="col-md-2"><small class="text-muted fw-bold">Preço Unit.</small></div>
                    <div class="col-md-2"><small class="text-muted fw-bold">Total Item</small></div>
                    <div class="col-md-1"><small class="text-muted fw-bold">Desconto</small></div>
                    <div class="col-md-1"><small class="text-muted fw-bold">Ação</small></div>
                </div>

                <div id="itens-container">
                    <div class="row mb-2 item-row align-items-center">
                        <div class="col-md-3">
                            <select name="product_id[]" class="form-select form-select-sm product-select" required>
                                <option value="">Produto...</option>
                                {% for tipo, produtos_tipo in products | groupby('type_name') %}
                                <optgroup label="{{ tipo }}">
                                    {% for p in produtos_tipo %}
                                    <option value="{{ p.id }}" data-price="{{ p.price }}">
                                        {{ p.name }} (Estoque: {{ p.stock }})
                                    </option>
                                    {% endfor %}
                                </optgroup>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-2">
                            <input type="text" name="serialnumber[]" class="form-control form-control-sm serialnumber-input" maxlength="15" placeholder="Serial">
                        </div>
                        <div class="col-md-1">
                            <input type="number" name="quantity[]" class="form-control form-control-sm quantity-input" min="1" value="1" required>
                        </div>
                        <div class="col-md-2">
                            <input type="number" step="0.01" min="0" name="price[]" class="form-control form-control-sm price-input" placeholder="0.00" required>
                            <input type="hidden" class="original-price" value="">
                        </div>
                        <div class="col-md-2">
                            <input type="text" name="item_total[]" class="form-control form-control-sm total-input" readonly placeholder="0.00">
                        </div>
                        <div class="col-md-1">
                            <input type="text" class="form-control form-control-sm discount-input" readonly placeholder="0.00">
                        </div>
                        <div class="col-md-1 text-center">
                            <button type="button" class="btn btn-outline-danger btn-sm remove-item">🗑</button>
                        </div>
                    </div>
                </div>

                <div class="text-end mb-3">
                    <button type="button" class="btn btn-outline-primary btn-sm" id="add-item">+ Adicionar Item</button>
                </div>

                <!-- ✅ RESUMO DO PEDIDO -->
                <div class="card bg-light mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <strong>Total Bruto:</strong>
                                <input type="text" id="total-bruto" class="form-control form-control-sm" readonly value="R$ 0.00">
                            </div>
                            <div class="col-md-4">
                                <strong>Total Desconto:</strong>
                                <input type="text" id="total-desconto" class="form-control form-control-sm" readonly value="R$ 0.00">
                            </div>
                            <div class="col-md-4">
                                <strong>Total Líquido:</strong>
                                <input type="text" id="total-liquido" class="form-control form-control-sm fw-bold" readonly value="R$ 0.00">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-success">💾 Salvar Pedido</button>
                    <button type="button" id="cancel-button" class="btn btn-outline-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    // Atualiza o preço ao selecionar produto
    function updatePrice(selectElement) {
        const selected = selectElement.options[selectElement.selectedIndex];
        const price = selected.getAttribute("data-price") || "";
        const row = selectElement.closest(".item-row");
        const priceInput = row.querySelector(".price-input");
        const originalPriceInput = row.querySelector(".original-price");
        
        // ✅ Define o preço automaticamente ao selecionar o produto
        if (priceInput && price) {
            priceInput.value = parseFloat(price).toFixed(2);
            // Guarda o preço original para calcular desconto
            if (originalPriceInput) {
                originalPriceInput.value = price;
            }
        }
        updateRowTotal(row);
    }

    // Atualiza o total do item e calcula desconto
    function updateRowTotal(row) {
        const qty = parseFloat(row.querySelector(".quantity-input").value) || 0;
        const price = parseFloat(row.querySelector(".price-input").value) || 0;
        const originalPrice = parseFloat(row.querySelector(".original-price").value) || price;
        
        const total = qty * price;
        row.querySelector(".total-input").value = total.toFixed(2);
        
        // ✅ Calcula o desconto (diferença entre preço original e preço com desconto)
        const discount = (originalPrice - price) * qty;
        const discountInput = row.querySelector(".discount-input");
        if (discountInput) {
            discountInput.value = discount > 0 ? discount.toFixed(2) : "0.00";
        }
        
        // ✅ Atualiza os totais gerais
        updateTotals();
    }

    // ✅ Calcula e atualiza os totais do pedido
    function updateTotals() {
        let totalBruto = 0;
        let totalDesconto = 0;
        let totalLiquido = 0;

        document.querySelectorAll(".item-row").forEach(row => {
            const qty = parseFloat(row.querySelector(".quantity-input").value) || 0;
            const originalPrice = parseFloat(row.querySelector(".original-price").value) || 0;
            const price = parseFloat(row.querySelector(".price-input").value) || 0;
            
            if (qty > 0 && price > 0) {
                const itemBruto = qty * (originalPrice || price);
                const itemLiquido = qty * price;
                const itemDesconto = itemBruto - itemLiquido;
                
                totalBruto += itemBruto;
                totalLiquido += itemLiquido;
                totalDesconto += itemDesconto;
            }
        });

        // Atualiza os campos de resumo
        document.getElementById("total-bruto").value = `R$ ${totalBruto.toFixed(2)}`.replace('.', ',');
        document.getElementById("total-desconto").value = `R$ ${totalDesconto.toFixed(2)}`.replace('.', ',');
        document.getElementById("total-liquido").value = `R$ ${totalLiquido.toFixed(2)}`.replace('.', ',');
    }

    // Valida estoque em tempo real
    async function checkStock(row) {
        const select = row.querySelector(".product-select");
        const qtyInput = row.querySelector(".quantity-input");
        const productId = select.value;

        if (!productId) return;

        try {
            const response = await fetch(`/admin/order/check_stock/${productId}`);
            if (!response.ok) return;
            const data = await response.json();
            const stock = data.stock;

            const qty = parseInt(qtyInput.value) || 0;
            if (qty > stock) {
                alert(`❌ Estoque insuficiente! Disponível: ${stock}, solicitado: ${qty}.`);
                qtyInput.value = stock;
                updateRowTotal(row);
            }
        } catch (err) {
            console.error("Erro ao verificar estoque:", err);
        }
    }

    // Aplica listeners de eventos a uma linha
    function applyRowListeners(row) {
        const productSelect = row.querySelector(".product-select");
        const qtyInput = row.querySelector(".quantity-input");
        const priceInput = row.querySelector(".price-input");
        const removeBtn = row.querySelector(".remove-item");

        if (productSelect) productSelect.addEventListener("change", () => updatePrice(productSelect));
        if (qtyInput) qtyInput.addEventListener("input", () => {
            updateRowTotal(row);
            checkStock(row);
        });
        if (priceInput) priceInput.addEventListener("input", () => updateRowTotal(row));
        if (removeBtn) removeBtn.addEventListener("click", () => {
            // Só remove se houver mais de 1 item
            if (document.querySelectorAll(".item-row").length > 1) {
                row.remove();
                updateTotals(); // ✅ Atualiza totais após remover
            } else {
                alert("Deve haver pelo menos um item no pedido!");
            }
        });
    }

    // Inicializa linhas existentes
    document.querySelectorAll(".item-row").forEach(row => applyRowListeners(row));

    // ✅ Adiciona novo item SEM LABELS (apenas os campos)
    document.getElementById("add-item").addEventListener("click", () => {
        const container = document.getElementById("itens-container");
        const clone = container.querySelector(".item-row").cloneNode(true);

        // ✅ LIMPA TODOS OS CAMPOS DO ITEM CLONADO
        // Limpa o select de produto
        const selectProduct = clone.querySelector(".product-select");
        if (selectProduct) selectProduct.selectedIndex = 0;
        
        // Limpa o serial number
        const serialInput = clone.querySelector(".serialnumber-input");
        if (serialInput) serialInput.value = "";
        
        // Reseta quantidade para 1
        const qtyInput = clone.querySelector(".quantity-input");
        if (qtyInput) qtyInput.value = "1";
        
        // Limpa preço
        const priceInput = clone.querySelector(".price-input");
        if (priceInput) priceInput.value = "";
        
        // Limpa preço original
        const originalPriceInput = clone.querySelector(".original-price");
        if (originalPriceInput) originalPriceInput.value = "";
        
        // Limpa total
        const totalInput = clone.querySelector(".total-input");
        if (totalInput) totalInput.value = "";
        
        // Limpa desconto
        const discountInput = clone.querySelector(".discount-input");
        if (discountInput) discountInput.value = "";

        container.appendChild(clone);
        applyRowListeners(clone);
    });

    // ----------- PAGAMENTO -----------
    const paymentFormSelect = document.getElementById("payment_form");
    const paymentAmountDiv = document.getElementById("payment_amount_div");
    const paymentConditionDiv = document.getElementById("payment_condition_div");
    const paymentFormInpDiv = document.getElementById("payment_form_inp_div");

    function updatePaymentFields() {
        const val = parseInt(paymentFormSelect.value);

        paymentAmountDiv.style.display = "none";
        paymentConditionDiv.style.display = "none";
        paymentFormInpDiv.style.display = "none";

        if (val === 4) {
            paymentConditionDiv.style.display = "block";
        } else if (val === 5) {
            paymentAmountDiv.style.display = "block";
            paymentFormInpDiv.style.display = "block";
            paymentConditionDiv.style.display = "block";
        }
    }

    paymentFormSelect.addEventListener("change", updatePaymentFields);

    // Confirmação ao cancelar o pedido
    const cancelButton = document.getElementById("cancel-button");
    if (cancelButton) {
        cancelButton.addEventListener("click", function() {
            const confirmCancel = confirm("Tem certeza que deseja cancelar este pedido?\nTodas as informações preenchidas serão perdidas.");
            if (confirmCancel) {
                window.location.href = "{{ url_for('order_bp.order_list') }}";
            }
        });
    }
});
</script>

{% endblock content %}
